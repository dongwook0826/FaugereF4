name = "FaugereF4"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["FaugereF4"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
### if using git repo, use below
#scope = "leanprover-community"
#rev = "v4.27.0-rc1"
### if using local dir, use below
path = "../.modules/mathlib4"
version = "v4.27.0-rc1"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "«doc-gen4»"
git = "https://github.com/leanprover/doc-gen4"
rev = "main"

[[lean_lib]]
name = "FaugereF4"
